services:
  minio:
    image: minio/minio:RELEASE.2025-04-22T22-12-26Z
    container_name: condominios-minio
    command: server /data --console-address ":9001"
    ports:
      - "9100:9000"
      - "9101:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin123
      MINIO_SERVER_URL: http://localhost:9100
      MINIO_BROWSER_REDIRECT_URL: http://localhost:9101
    volumes:
      - minio_data:/data

  minio-create-bucket:
    image: minio/mc:RELEASE.2025-04-16T18-13-26Z
    container_name: condominios-minio-init
    depends_on:
      - minio
    entrypoint: >
      /bin/sh -c "
      until mc alias set local http://minio:9000 minioadmin minioadmin123; do sleep 2; done;
      mc mb --ignore-existing local/condominios-dev;
      mc anonymous set download local/condominios-dev;
      "

volumes:
  minio_data:
